name: Unorepo Version

on:
  push:
    branches: [main]
    paths:
      - ".changenotes/prepare.json"

permissions:
  id-token: write
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
      - run: npm install -g corepack
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build package
        run: npm run build
      - name: Version
        run: npx unorepo-alpha version --commit --tag --push --publish --release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}